<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMI 자금관리센터</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f0f4f8;color:#1a2a3a;font-size:14px;}

.topbar{background:#0d2137;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:52px;}
.top-left{display:flex;align-items:center;gap:12px;}
.logo{width:30px;height:30px;background:#1a5f9e;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:bold;}
.site-title{color:#fff;font-size:15px;font-weight:bold;}
.site-sub{color:#6899c0;font-size:11px;}
.top-right{display:flex;align-items:center;gap:12px;}
.live-badge{background:#0f3d1f;color:#5dcaa5;font-size:11px;padding:3px 10px;border-radius:20px;display:flex;align-items:center;gap:5px;}
.live-dot{width:6px;height:6px;background:#1d9e75;border-radius:50%;}
.last-update{color:#6899c0;font-size:11px;}

.nav{background:#102840;display:flex;border-bottom:1px solid #1e3a55;}
.nav-btn{color:#6899c0;font-size:13px;padding:12px 20px;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;}
.nav-btn.active{color:#fff;border-bottom:2px solid #4a9fd4;}

.content{padding:20px 24px;max-width:1200px;margin:0 auto;}

.date-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;background:#fff;padding:10px 16px;border-radius:8px;border:1px solid #dde3ea;}
.date-bar label{font-size:12px;color:#6b7c8d;font-weight:bold;}
.date-bar input{font-size:13px;padding:5px 10px;border:1px solid #cdd5de;border-radius:6px;color:#1a2a3a;}
.date-bar button{font-size:12px;padding:6px 14px;border:1px solid #cdd5de;border-radius:6px;background:#fff;color:#1a2a3a;cursor:pointer;}
.date-bar button:hover{background:#0d2137;color:#fff;border-color:#0d2137;}
.basis-text{margin-left:auto;font-size:12px;color:#6b7c8d;}

.kpi-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;margin-bottom:18px;}
.kpi-card{background:#fff;border-radius:10px;padding:16px;border:1px solid #dde3ea;}
.kpi-card.hl{border-top:3px solid #1a5f9e;}
.kpi-label{font-size:11px;color:#6b7c8d;margin-bottom:8px;}
.kpi-value{font-size:22px;font-weight:bold;color:#0d2137;}
.kpi-sub{font-size:11px;margin-top:5px;}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
.card{background:#fff;border-radius:10px;padding:16px;border:1px solid #dde3ea;}
.sec{font-size:13px;font-weight:bold;color:#0d2137;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.sec::before{content:'';width:3px;height:14px;background:#1a5f9e;border-radius:2px;display:inline-block;}

.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{background:#f7f9fb;color:#6b7c8d;font-weight:bold;padding:8px 10px;text-align:left;border-bottom:1px solid #dde3ea;}
.tbl td{padding:8px 10px;border-bottom:1px solid #f0f4f8;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:#f7f9fb;}
.tbl .r{text-align:right;font-weight:bold;}
.tbl .total td{background:#e6f1fb;font-weight:bold;}

.badge{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:bold;}
.b-danger{background:#fcebeb;color:#a32d2d;}
.b-warn{background:#faeeda;color:#854f0b;}
.b-ok{background:#e1f5ee;color:#0f6e56;}
.b-gray{background:#f1efe8;color:#5f5e5a;}
.b-blue{background:#e6f1fb;color:#185fa5;}

.up{color:#0f6e56;} .dn{color:#a32d2d;} .nt{color:#6b7c8d;}
.alert-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid #f0f4f8;font-size:12px;}
.alert-row:last-child{border-bottom:none;}

.tab-c{display:none;} .tab-c.active{display:block;}

.loading{text-align:center;padding:40px;color:#6b7c8d;}
.sp{display:inline-block;width:18px;height:18px;border:2px solid #dde3ea;border-top:2px solid #1a5f9e;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:768px){
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .row2{grid-template-columns:1fr;}
  .content{padding:12px;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="top-left">
    <div class="logo">IMI</div>
    <div>
      <div class="site-title">IMI 자금관리센터</div>
      <div class="site-sub">(주)아이엠아이 · 재무팀</div>
    </div>
  </div>
  <div class="top-right">
    <div class="live-badge"><div class="live-dot"></div>자동갱신</div>
    <div class="last-update" id="lastUpdate">로딩 중...</div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="showTab('dashboard',this)">경영진 대시보드</button>
  <button class="nav-btn" onclick="showTab('transfers',this)">일일 이체 내역</button>
</div>

<div class="content">
  <div class="date-bar">
    <label>기준일</label>
    <input type="date" id="dateInput">
    <button onclick="filterDate()">조회</button>
    <button onclick="setToday()">오늘</button>
    <span class="basis-text" id="basisText"></span>
  </div>

  <div id="tab-dashboard" class="tab-c active">
    <div id="kpiArea"><div class="loading"><span class="sp"></span>데이터 불러오는 중...</div></div>
    <div id="detailArea"></div>
    <div id="summaryArea"></div>
  </div>

  <div id="tab-transfers" class="tab-c">
    <div id="transferArea"><div class="loading"><span class="sp"></span>데이터 불러오는 중...</div></div>
  </div>
</div>

<script>
const DATA_URL = 'https://raw.githubusercontent.com/hello38317-jhj/imi-dashboard/main/data.json';
let raw = null;
let selectedDate = '';

function showTab(name, btn) {
  document.querySelectorAll('.tab-c').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

function fa(n) {
  const v = Number(n);
  if (isNaN(v)) return '-';
  return (v / 100000000).toFixed(1) + '억';
}

function fp(n) {
  const v = Number(n) * 100;
  return isNaN(v) ? '-' : v.toFixed(1) + '%';
}

function diff(v) {
  const n = Number(v);
  if (!n) return '<span class="nt">변동없음</span>';
  return n > 0
    ? `<span class="up">▲ ${fa(Math.abs(n))}</span>`
    : `<span class="dn">▼ ${fa(Math.abs(n))}</span>`;
}

function liqBadge(pct) {
  const v = Number(pct) * 100;
  if (v < 30) return '<span class="badge b-danger">위험</span>';
  if (v < 40) return '<span class="badge b-warn">주의</span>';
  return '<span class="badge b-ok">정상</span>';
}

function lcrBadge(v) {
  const n = Number(v);
  if (n < 1.0) return '<span class="badge b-danger">위험</span>';
  if (n < 1.5) return '<span class="badge b-warn">주의</span>';
  return '<span class="badge b-ok">정상</span>';
}

function setToday() {
  selectedDate = new Date().toISOString().split('T')[0];
  document.getElementById('dateInput').value = selectedDate;
  render();
}

function filterDate() {
  selectedDate = document.getElementById('dateInput').value;
  render();
}

function loadData() {
  fetch(DATA_URL + '?t=' + Date.now())
    .then(r => r.json())
    .then(d => {
      raw = d;
      document.getElementById('lastUpdate').textContent = '업데이트: ' + d.업데이트시각;
      render();
    })
    .catch(e => {
      document.getElementById('kpiArea').innerHTML = '<div class="loading">데이터 로딩 실패. 잠시 후 새로고침 해주세요.</div>';
    });
}

function render() {
  if (!raw) return;
  renderKPI(raw.kpi);
  renderTransfers(raw.이체내역, selectedDate);
}

function renderKPI(d) {
  if (!d) return;
  document.getElementById('basisText').textContent = '기준일: ' + d.기준일;
  const liqPct = (Number(d.유동성) * 100).toFixed(1);
  const lcrVal = Number(d.LCR).toFixed(1);

  document.getElementById('kpiArea').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card hl">
        <div class="kpi-label">총 보유잔액</div>
        <div class="kpi-value">${fa(d.총보유잔액)}</div>
        <div class="kpi-sub">${diff(d.전일대비총보유)} 전일대비</div>
      </div>
      <div class="kpi-card hl">
        <div class="kpi-label">가용 자금</div>
        <div class="kpi-value">${fa(d.가용자금)}</div>
        <div class="kpi-sub">${diff(d.전일대비가용)} 전일대비</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">금융자산 합계</div>
        <div class="kpi-value">${fa(d.금융자산합계)}</div>
        <div class="kpi-sub nt">MMT + MMF + 정기예금</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">유동성 (선수금 대비)</div>
        <div class="kpi-value">${liqPct}%</div>
        <div class="kpi-sub">${liqBadge(d.유동성)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">LCR</div>
        <div class="kpi-value">${lcrVal}x</div>
        <div class="kpi-sub">${lcrBadge(d.LCR)}</div>
      </div>
    </div>`;

  document.getElementById('detailArea').innerHTML = `
    <div class="row2">
      <div class="card">
        <div class="sec">유동성 지표 상세</div>
        <table class="tbl">
          <tr><td>총 보유잔액</td><td class="r">${fa(d.총보유잔액)}</td></tr>
          <tr><td style="padding-left:16px;color:#6b7c8d;">(-) 사용제한금액</td><td class="r" style="color:#6b7c8d;">${fa(d.사용제한금액)}</td></tr>
          <tr><td style="padding-left:16px;color:#6b7c8d;">(-) 필요자금합계</td><td class="r" style="color:#6b7c8d;">${fa(d.필요자금합계)}</td></tr>
          <tr><td style="font-weight:bold;color:#1a5f9e;">= 가용자금</td><td class="r" style="font-weight:bold;color:#1a5f9e;">${fa(d.가용자금)}</td></tr>
          <tr><td>선수금 잔액</td><td class="r">${fa(d.선수금잔액)}</td></tr>
          <tr><td>선수금 대비 가용자금 비율</td><td class="r">${liqPct}%</td></tr>
          <tr><td>LCR</td><td class="r">${lcrVal}x</td></tr>
        </table>
      </div>
      <div class="card">
        <div class="sec">경보 현황</div>
        <div class="alert-row">
          ${liqBadge(d.유동성)}
          <span style="flex:1;">유동성 ${liqPct}% — ${Number(d.유동성)*100 >= 40 ? '정상 구간 유지 중' : '경계 구간 진입'}</span>
        </div>
        <div class="alert-row">
          ${lcrBadge(d.LCR)}
          <span style="flex:1;">LCR ${lcrVal}x — ${Number(d.LCR) >= 1.5 ? '정상' : '주의 필요'}</span>
        </div>
        <div class="alert-row">
          <span class="badge b-blue">정보</span>
          <span style="flex:1;">보통예금 ${fa(d.보통예금합계)} · 금융자산 ${fa(d.금융자산합계)}</span>
        </div>
      </div>
    </div>`;
}

function renderTransfers(list, date) {
  if (!list) return;
  const rows = list.filter(r => !date || r.날짜 === date);
  const total = rows.reduce((s, r) => s + Number(r.금액), 0);

  if (rows.length === 0) {
    const msg = `<div class="card"><div class="loading" style="padding:20px;">${date} 이체 내역이 없습니다.</div></div>`;
    document.getElementById('summaryArea').innerHTML = msg;
    document.getElementById('transferArea').innerHTML = msg;
    return;
  }

  document.getElementById('summaryArea').innerHTML = `
    <div class="card">
      <div class="sec">당일 이체 요약 (${date} · ${rows.length}건)</div>
      <table class="tbl">
        <thead><tr><th>적요</th><th>출금은행</th><th class="r">금액</th></tr></thead>
        <tbody>
          ${rows.slice(0,5).map(r=>`
            <tr>
              <td>${r.적요||'-'}</td>
              <td><span class="badge b-gray">${r.출금은행||'-'}</span></td>
              <td class="r">${fa(r.금액)}</td>
            </tr>`).join('')}
          ${rows.length>5?`<tr><td colspan="3" style="text-align:center;color:#6b7c8d;font-size:11px;">외 ${rows.length-5}건 → 이체 내역 탭에서 전체 확인</td></tr>`:''}
        </tbody>
        <tfoot><tr class="total"><td colspan="2">합계</td><td class="r">${fa(total)}</td></tr></tfoot>
      </table>
    </div>`;

  const byBank = {};
  rows.forEach(r => {
    const b = r.출금은행||'기타';
    byBank[b] = (byBank[b]||0) + Number(r.금액);
  });

  document.getElementById('transferArea').innerHTML = `
    <div style="display:grid;grid-template-columns:200px 1fr;gap:14px;">
      <div class="card">
        <div class="sec">은행별 소계</div>
        <table class="tbl">
          <thead><tr><th>은행</th><th class="r">금액</th></tr></thead>
          <tbody>
            ${Object.entries(byBank).sort((a,b)=>b[1]-a[1]).map(([bank,amt])=>`
              <tr><td><span class="badge b-gray">${bank}</span></td><td class="r">${fa(amt)}</td></tr>`).join('')}
          </tbody>
          <tfoot><tr class="total"><td>합계</td><td class="r">${fa(total)}</td></tr></tfoot>
        </table>
      </div>
      <div class="card">
        <div class="sec">전체 이체 내역 (${date} · ${rows.length}건)</div>
        <table class="tbl">
          <thead><tr><th>계정명</th><th>적요</th><th>출금은행</th><th class="r">금액</th></tr></thead>
          <tbody>
            ${rows.map(r=>`
              <tr>
                <td style="color:#6b7c8d;">${r.계정명||'-'}</td>
                <td>${r.적요||'-'}</td>
                <td><span class="badge b-gray">${r.출금은행||'-'}</span></td>
                <td class="r">${fa(r.금액)}</td>
              </tr>`).join('')}
          </tbody>
          <tfoot><tr class="total"><td colspan="3">합계</td><td class="r">${fa(total)}</td></tr></tfoot>
        </table>
      </div>
    </div>`;
}

window.onload = function() {
  setToday();
  loadData();
};
</script>
</body>
</html>
